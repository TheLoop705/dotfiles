# ~/.tmux.conf
# Intuitive tmux config for German QWERTZ keyboard
# Prefix: Ctrl+a

##### Prefix ###############################################################

unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### General ##############################################################

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g clock-mode-style 24
set -g focus-events on
set -g mouse on
set -g history-limit 100000
set -g escape-time 10
set -g status-position top

# Keep paths when creating new windows/panes
bind c new-window -c "#{pane_current_path}"

##### Terminal / colors ####################################################

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",wezterm:RGB"
set -ga terminal-overrides ",xterm-256color:RGB"

# Start zsh inside tmux
set -g default-shell /usr/bin/zsh
set -g default-command /usr/bin/zsh

# Better modern keyboard handling. Works well in WezTerm/new terminals.
set -g extended-keys on
set -g extended-keys-format csi-u

##### Visuals ##############################################################

set -g pane-border-lines heavy

# Do not dim inactive panes
setw -gu window-style
setw -gu window-active-style

# Do not allow programs to rename windows
set -g allow-rename off
setw -g automatic-rename off

##### Reload ###############################################################

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

##### Sessions #############################################################
# Session = workspace/project

bind s choose-session
bind d detach-client

##### Windows ##############################################################
# Window = tab inside the current session

bind n next-window
bind p previous-window
bind w choose-window
bind , command-prompt -I "#W" "rename-window '%%'"
bind q confirm-before -p "Kill window #W? (y/n)" kill-window

##### Panes ################################################################
# Pane = split inside the current window
# QWERTZ-friendly: avoid | and - because they are awkward on German layouts.

bind v split-window -h -c "#{pane_current_path}"  # side-by-side split
bind b split-window -v -c "#{pane_current_path}"  # below split
bind x confirm-before -p "Kill pane? (y/n)" kill-pane

# Pane navigation: vim-style keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane navigation: arrow keys
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# Resize panes with prefix + Shift arrow
bind -r S-Left resize-pane -L 5
bind -r S-Down resize-pane -D 5
bind -r S-Up resize-pane -U 5
bind -r S-Right resize-pane -R 5

# Resize panes with prefix + uppercase vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Fast window switching without prefix #################################
# Alt+Left / Alt+Right changes windows directly.

bind -n M-Left previous-window
bind -n M-Right next-window

##### Copy mode ############################################################

setw -g mode-keys vi
bind e copy-mode
bind P paste-buffer

bind-key -T copy-mode-vi Space send-keys -X begin-selection
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi Escape send-keys -X cancel

##### Status bar ###########################################################

set -g status on
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 100

set -g status-left " #S "
set -g status-right " #{pane_current_path} | %Y-%m-%d %H:%M "

setw -g window-status-format " #I: #W "
setw -g window-status-current-format " #I: #W* "

# Sessions
bind s choose-session
bind S command-prompt -p "New session name:" "new-session -s '%%' -c '#{pane_current_path}'"
